# mise global configuration
# Symlinked to ~/.config/mise/config.toml
# mise auto-installs these versions when shell starts (via mise activate in zshrc)
#
# Note: Multiple JS runtimes (Node, Bun, Deno) can coexist without conflicts.
# Each has its own binaries and package managers:
#   - Node: npm, pnpm (via corepack), yarn (via corepack)
#   - Bun: bun (built-in package manager + runtime)
#   - Deno: deno (runtime with built-in tooling)

[tools]
# Python
python = "3.14.3"

# Node.js ecosystem
node = "24.13.1"
pnpm = "latest"
yarn = "latest"

# Modern JavaScript runtimes
bun = "latest"      # Fast all-in-one JS runtime (includes bundler, test runner, package manager)
deno = "latest"     # Secure TypeScript/JavaScript runtime

# Java ecosystem
java = "25"
maven = "latest"
gradle = "9.4.1"

# Additional languages (managed by mise, not Homebrew)
# Uncomment to enable:
# go = "latest"
# rust = "latest"

[settings]
# Auto-install missing tools on shell activation
auto_install = true

# Use all CPU cores for parallel installs
jobs = 4

# Follow symlinks when detecting tool versions in projects
legacy_version_file = true

# Support .tool-versions and .mise.toml in projects
legacy_version_file_disable_tools = []
